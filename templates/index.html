<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Scraper & Report Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="orb"></div>

<div class="container">
    <div class="card">

        <div class="badge">⚡ Live Job Scraper</div>
        <h1>Find Jobs,<br>Get <span>Reports.</span></h1>
        <p class="subtitle">Search any job role and location — get a clean PDF report downloaded instantly.</p>

        <div class="divider"></div>

        {% if error %}
        <div class="error">⚠️ {{ error }}</div>
        {% endif %}

        <form action="/generate" method="POST">
            <div class="form-group">
                <label>Job Keyword</label>
                <div class="input-wrap">
                    <span>🔍</span>
                    <input type="text" name="keyword" placeholder="e.g. Python Developer, Data Analyst" required>
                </div>
            </div>
            <div class="form-group">
                <label>Location</label>
                <div class="input-wrap">
                    <span>📍</span>
                    <input type="text" name="location" placeholder="e.g. Bangalore, Mumbai, Delhi" required>
                </div>
            </div>
            <button type="submit" class="btn">Generate PDF Report →</button>
        </form>

        <p class="footer-text">
    <a href="/login" style="color:#3b82f6;">Login</a> · 
    <a href="/register" style="color:#3b82f6;">Register</a>
</p>
<p class="footer-text" style="margin-top:8px;">Built by Adharv Shyam</p>

    </div>
</div>

</body>
</html>
