<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Job Scraper</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="orb"></div>

<div class="container">
    <div class="card">

        <div class="badge">🚀 Get Started</div>
        <h1>Create an <span>Account</span></h1>
        <p class="subtitle">Join Job Scraper and save your search history</p>

        <div class="divider"></div>

        {% if error %}
        <div class="error">⚠️ {{ error }}</div>
        {% endif %}

        <form action="/register" method="POST">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrap">
                    <span>👤</span>
                    <input type="text" name="username" placeholder="Choose a username" required>
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrap">
                    <span>📧</span>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <span>🔒</span>
                    <input type="password" name="password" placeholder="Choose a password" required>
                </div>
            </div>
            <button type="submit" class="btn">Create Account →</button>
        </form>

        <p class="footer-text">Already have an account? <a href="/login" style="color:#3b82f6;">Login here</a></p>

    </div>
</div>

</body>
</html>
